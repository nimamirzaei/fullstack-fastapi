apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fullstack-fastapi-ingress
  namespace: {{ .Values.namespace }}
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80
